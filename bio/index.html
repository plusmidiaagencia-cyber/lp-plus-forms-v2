<style>
  :root{
    --bg:#0a0a0a;
    --bg-2:#111;
    --card:#0e2a4d;
    --card-2:#0a1f3d;
    --border:#1a3a5e;
    --text:#ffffff;
    --text-dark:#ffffff;
    --muted:#a6a6a6;
    --muted-dark:#9eb6cf;
    --dim:#7a7a7a;
    --brand:#38b6ff;
    --brand-2:#1e9bdb;
    --brand-light:#7ad1ff;
    --brand-glow:rgba(56,182,255,.18);
    --brand-strong:rgba(56,182,255,.35);
    --radius:20px;
    --maxw:1080px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{
    font-family:'Roboto',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    overflow-x:hidden;
    line-height:1.6;
  }

  /* Glow ambient cyan */
  body::before{
    content:"";
    position:fixed;inset:0;
    background:
      radial-gradient(60% 50% at 50% 0%, var(--brand-glow), transparent 60%),
      radial-gradient(50% 40% at 50% 100%, rgba(56,182,255,.10), transparent 60%);
    pointer-events:none;
    z-index:0;
    animation:breath 8s ease-in-out infinite;
  }
  @keyframes breath{
    0%,100%{opacity:.7}
    50%{opacity:1}
  }

  /* Grain */
  .grain{
    position:fixed;inset:0;pointer-events:none;
    z-index:1;opacity:.035;mix-blend-mode:overlay;
  }

  .wrap{
    position:relative;
    z-index:2;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:56px 22px 40px;
    max-width:var(--maxw);
    margin:0 auto;
    gap:42px;
  }

  /* Header */
  .head{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    text-align:center;
  }
  .head img{
    width:auto;
    height:54px;
    filter:drop-shadow(0 8px 28px var(--brand-glow));
  }
  .head .eyebrow{
    font-family:'Montserrat',sans-serif;
    font-size:11px;
    font-weight:700;
    letter-spacing:.36em;
    color:var(--brand);
    text-transform:uppercase;
  }
  .head h1{
    font-family:'Montserrat',sans-serif;
    font-weight:800;
    font-size:clamp(1.4rem,4.2vw,1.85rem);
    line-height:1.25;
    color:var(--text);
    max-width:560px;
  }
  .head h1 .accent{
    background:linear-gradient(135deg, var(--brand), #7ad1ff);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  /* Banners */
  .banners{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:24px;
  }

  .banner{
    position:relative;
    display:grid;
    grid-template-columns:minmax(220px,38%) 1fr;
    background:linear-gradient(180deg, var(--card), var(--card-2));
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:0 30px 60px -30px rgba(0,0,0,.6), 0 0 0 1px rgba(56,182,255,.08);
    isolation:isolate;
    transition:transform .35s ease, box-shadow .35s ease;
  }
  /* Gradient border cyan estilo /forms */
  .banner::before{
    content:"";
    position:absolute;inset:0;
    border-radius:var(--radius);
    padding:1.5px;
    background:linear-gradient(135deg, var(--brand), transparent 50%, var(--brand-2));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
            mask-composite:exclude;
    pointer-events:none;
    opacity:.55;
    transition:opacity .35s ease;
  }
  .banner:hover{
    transform:translateY(-4px);
    box-shadow:0 40px 80px -30px rgba(0,0,0,.7), 0 0 0 1px var(--brand-strong), 0 0 40px -10px var(--brand-glow);
  }
  .banner:hover::before{opacity:1}

  .banner .media{
    position:relative;
    background:
      radial-gradient(80% 100% at 0% 50%, rgba(56,182,255,.18) 0%, transparent 60%),
      linear-gradient(120deg, #0e2a4d, #081a36);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 28px;
    min-height:240px;
  }
  .banner .media::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(90deg, transparent 60%, var(--card-2) 100%);
    pointer-events:none;
  }
  .banner .media img{
    position:relative;
    max-width:78%;
    max-height:160px;
    width:auto;
    height:auto;
    object-fit:contain;
    z-index:1;
    filter:drop-shadow(0 14px 30px rgba(56,182,255,.45));
    transition:transform .5s ease;
  }
  .banner:hover .media img{transform:scale(1.05)}

  .banner .body{
    padding:40px 48px 40px 24px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:flex-start;
    gap:18px;
  }
  .banner h2{
    font-family:'Montserrat',sans-serif;
    font-weight:800;
    font-size:clamp(1.7rem,3.6vw,2.4rem);
    line-height:1.05;
    letter-spacing:-.015em;
    color:var(--text-dark);
    text-transform:none;
  }
  .banner .lead{
    color:var(--muted-dark);
    font-size:clamp(14px,1.5vw,16px);
    line-height:1.55;
    max-width:520px;
  }
  .banner .lead strong{
    color:var(--brand-light);
    font-weight:700;
  }

  .cta{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:15px 28px;
    background:linear-gradient(135deg, var(--brand), var(--brand-2));
    color:#001a26;
    border:none;
    border-radius:999px;
    font-family:'Montserrat',sans-serif;
    font-weight:800;
    font-size:13px;
    letter-spacing:.06em;
    text-transform:uppercase;
    text-decoration:none;
    cursor:pointer;
    transition:transform .25s ease, box-shadow .25s ease, filter .25s ease;
    box-shadow:0 12px 28px -10px rgba(56,182,255,.55);
  }
  /* Pulse ring (padrão Plus Mídia) */
  .cta::after{
    content:"";
    position:absolute;inset:-3px;
    border-radius:999px;
    border:2px solid var(--brand);
    opacity:0;
    animation:pulse 2.4s ease-out infinite;
    pointer-events:none;
  }
  @keyframes pulse{
    0%{opacity:.55;transform:scale(1)}
    70%{opacity:0;transform:scale(1.08)}
    100%{opacity:0;transform:scale(1.08)}
  }
  .cta:hover{
    transform:translateY(-1px);
    filter:brightness(1.08);
    box-shadow:0 16px 36px -10px rgba(56,182,255,.7);
  }
  .cta:hover::after{animation-play-state:paused}
  .cta:active{transform:translateY(0)}
  .cta svg{width:14px;height:14px}

  /* Footer */
  .foot{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    color:var(--dim);
    font-size:12px;
    text-align:center;
    margin-top:8px;
  }
  .foot a{color:var(--muted);text-decoration:none}
  .foot a:hover{color:var(--brand)}

  /* Reveal */
  .reveal{
    opacity:0;
    transform:translateY(20px);
    transition:opacity .8s ease, transform .8s ease;
  }
  .reveal.in{opacity:1;transform:none}

  /* Reduced motion */
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
    .reveal{opacity:1;transform:none}
  }

  /* Responsivo */
  @media (max-width:760px){
    .wrap{
      padding:36px 18px max(28px, env(safe-area-inset-bottom));
      gap:28px;
    }
    .head img{height:44px}
    .banners{gap:18px}
    .banner{
      grid-template-columns:1fr;
      border-radius:18px;
    }
    .banner .media{
      min-height:200px;
      padding:36px 24px 20px;
    }
    .banner .media::after{
      background:linear-gradient(180deg, transparent 65%, var(--card-2) 100%);
    }
    .banner .media img{
      max-height:130px;
      max-width:60%;
    }
    .banner .body{
      padding:4px 24px 32px;
      align-items:center;
      text-align:center;
      gap:14px;
    }
    .banner h2{
      font-size:1.7rem;
      line-height:1.1;
    }
    .banner .lead{
      max-width:none;
      font-size:15px;
    }
    .cta{
      width:100%;
      justify-content:center;
      padding:17px 24px;
      font-size:13px;
      min-height:52px;
    }
    .foot{margin-top:4px;font-size:11px}
  }

  @media (max-width:420px){
    .wrap{padding:28px 16px max(24px, env(safe-area-inset-bottom));gap:24px}
    .head img{height:40px}
    .banner .media{min-height:180px;padding:30px 20px 14px}
    .banner .media img{max-height:110px;max-width:58%}
    .banner .body{padding:4px 20px 28px}
    .banner h2{font-size:1.5rem}
    .banner .lead{font-size:14.5px;line-height:1.5}
  }

  @media (max-width:360px){
    .wrap{padding:24px 14px max(20px, env(safe-area-inset-bottom))}
    .banner .media{min-height:160px}
    .banner .media img{max-height:96px}
    .banner h2{font-size:1.35rem}
    .banner .body{padding:4px 16px 24px}
    .cta{font-size:12px;padding:16px 20px}
  }
</style>
</head>

<script>
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const reveals = document.querySelectorAll('.reveal');
  if(reduce){
    reveals.forEach(el=>el.classList.add('in'));
  } else {
    reveals.forEach((el,i)=>{
      setTimeout(()=>el.classList.add('in'), 120 + i*180);
    });
  }

  document.querySelectorAll('[data-track]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const ev = el.getAttribute('data-track');
      try{
        if(window.fbq) window.fbq('trackCustom', ev, {source:'link_in_bio'});
        if(window.dataLayer) window.dataLayer.push({event:'bio_click', target: ev});
      }catch(e){}
    });
  });
</script>
